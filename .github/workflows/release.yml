name: release

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Install Dependencies
      run: corepack enable && pnpm install
    - name: Testing
      run: pnpm test:ci

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Install Dependencies
      run: corepack enable && pnpm install
    - name: Build
      run: pnpm build

  publish:
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Install Dependencies
      run: corepack enable && pnpm install
    - name: Build
      run: pnpm build
    - name: Publish
      run: pnpm publish --provenance --ignore-scripts --no-git-checks
